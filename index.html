<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1628">
    <title>G&amp;G Sanitation Digital</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box }
        body { min-height:100vh; background: linear-gradient(180deg, #0a1628 0%, #162544 40%, #1d3566 100%); background-attachment:fixed; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing:antialiased }
        .landing { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px }
        .brand { font-size:13px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-bottom:24px }
        .prod-img { width:180px; height:180px; border-radius:50%; object-fit:cover; margin-bottom:32px; box-shadow:0 16px 48px rgba(0,0,0,0.3); border:3px solid rgba(255,255,255,0.1) }
        .btn-san { font-size:1.35rem; font-weight:700; padding:26px 48px; min-height:80px; border-radius:20px; background:#fff; color:#0a1628; border:none; box-shadow:0 8px 32px rgba(0,0,0,0.3); cursor:pointer; transition:all 0.3s }
        .btn-san:hover { transform:translateY(-3px); box-shadow:0 14px 44px rgba(0,0,0,0.4) }
        .version { margin-top:24px; font-size:12px; color:rgba(255,255,255,0.4) }
        .page { padding:24px 20px 40px; max-width:480px; margin:0 auto; min-height:100vh }
        .top { text-align:center; margin-bottom:28px }
        .top .brand { font-size:12px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:8px }
        .top h1 { font-size:32px; font-weight:700; margin-bottom:4px }
        .top .sub { font-size:15px; color:rgba(255,255,255,0.6) }
        .back-btn { display:inline-flex; align-items:center; gap:8px; color:rgba(255,255,255,0.6); font-size:14px; font-weight:500; background:none; border:none; cursor:pointer; padding:8px 0; margin-bottom:16px }
        .card { display:flex; align-items:center; gap:16px; padding:20px; background:rgba(255,255,255,0.07); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); border-radius:20px; margin-bottom:16px; cursor:pointer; transition:all 0.3s }
        .card:hover { background:rgba(255,255,255,0.12); transform:translateY(-4px); box-shadow:0 20px 60px rgba(0,0,0,0.3) }
        .card.coming { opacity:0.5; cursor:default; position:relative }
        .card.coming:hover { transform:none; box-shadow:none }
        .card img { width:72px; height:72px; border-radius:50%; object-fit:cover; flex-shrink:0; border:2px solid rgba(255,255,255,0.15) }
        .card-info { flex:1; min-width:0 }
        .card-name { font-size:18px; font-weight:700; margin-bottom:4px }
        .card-desc { font-size:13px; color:rgba(255,255,255,0.6) }
        .badge { display:inline-block; padding:4px 12px; border-radius:9999px; font-size:11px; font-weight:600; margin-top:4px }
        .badge-active { background:rgba(0,208,132,0.15); color:#00d084 }
        .badge-soon { background:rgba(255,140,66,0.15); color:#ff8c42 }
        .overlay { position:absolute; inset:0; background:rgba(10,22,40,0.7); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; border-radius:20px; font-size:14px; font-weight:600; letter-spacing:2px; text-transform:uppercase }
        .ctrl-top { text-align:center; margin-bottom:24px }
        .ctrl-top h1 { font-size:26px; font-weight:700; margin:4px 0 }
        .ring-wrap { display:flex; justify-content:center; margin:16px 0 28px }
        .ring { width:140px; height:140px; position:relative }
        .ring svg { width:100%; height:100%; transform:rotate(-90deg) }
        .ring-txt { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center }
        .ring-txt .pct { font-size:30px; font-weight:700 }
        .ring-txt .lbl { font-size:11px; color:rgba(255,255,255,0.6) }
        .act-btn { display:flex; align-items:center; gap:14px; padding:18px 20px; background:rgba(255,255,255,0.07); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); border-radius:20px; cursor:pointer; transition:all 0.3s; text-align:left; width:100%; border:none; color:inherit; margin-bottom:12px }
        .act-btn:hover { background:rgba(255,255,255,0.12); transform:translateY(-3px); box-shadow:0 16px 48px rgba(0,0,0,0.25) }
        .act-icon { width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; color:#fff }
        .act-txt { flex:1 }
        .act-txt .t { font-size:16px; font-weight:600 }
        .act-txt .d { font-size:13px; color:rgba(255,255,255,0.6); margin-top:2px }
        .act-arr { font-size:20px; color:rgba(255,255,255,0.4); flex-shrink:0 }
        .glass { background:rgba(255,255,255,0.07); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:20px; margin-bottom:16px }
        .chk-title { font-size:18px; font-weight:600; margin-bottom:8px }
        .chk-desc { font-size:14px; color:rgba(255,255,255,0.6); margin-bottom:16px }
        .opt { display:block; width:100%; padding:16px; margin-bottom:10px; border:2px dashed rgba(255,255,255,0.25); border-radius:9999px; background:transparent; color:white; font-size:15px; font-weight:500; cursor:pointer; text-align:center }
        .opt:hover { border-color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.04) }
        .emp-in { margin-bottom:20px }
        .emp-in label { display:block; font-size:13px; font-weight:500; color:rgba(255,255,255,0.6); margin-bottom:8px }
        .emp-in input { width:100%; padding:14px 16px; font-size:16px; border:1.5px solid rgba(255,255,255,0.15); border-radius:20px; background:rgba(255,255,255,0.06); color:white; outline:none }
        .btn-nav { display:flex; gap:12px; margin-top:20px }
        .btn-nav button { flex:1; padding:16px 24px; font-size:16px; font-weight:600; border-radius:20px; cursor:pointer }
        .btn-cancel { background:transparent; border:1.5px solid rgba(255,255,255,0.25); color:white }
        .btn-submit { background:linear-gradient(135deg,#00d084,#00b894); border:none; color:white }
        .counts { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px }
        .counts label { display:block; font-size:13px; font-weight:500; color:rgba(255,255,255,0.6); margin-bottom:8px }
        .counts input { width:100%; padding:14px 16px; font-size:16px; border:1.5px solid rgba(255,255,255,0.15); border-radius:20px; background:rgba(255,255,255,0.06); color:white; outline:none }
        .bn { border-radius:20px; padding:14px 18px; margin-bottom:20px; font-size:14px; font-weight:500; text-align:center }
        .bn-dang { background:rgba(255,71,87,0.1); border:1px solid rgba(255,71,87,0.25); color:#ff4757 }
        .loading { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px }
        .spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top-color:#00d084; border-radius:50%; animation:spin 1s linear infinite }
        @keyframes spin { to { transform:rotate(360deg) } }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        const app = document.getElementById("app");
        const SUPABASE_URL = "https://ujirzdzxlcejknkfbeom.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqaXJ6ZHp4bGNlamtua2ZiZW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMTExNzEsImV4cCI6MjA5NTY4NzE3MX0.YobRyxsN18W4YtzTrvefNI6EkuCCldE_3OouADzme5s";
        const MACY_ID = "1b21b26e-0a40-4533-9332-7d5f531eea1a";

        function showLanding() {
            app.innerHTML = `<div class="landing">
                <div class="brand">G&amp;G SANITATION DIGITAL</div>
                <img src="/macy-cupcake.jpg" alt="MACY Cupcake" class="prod-img">
                <button class="btn-san" onclick="showLines()">Start Sanitation</button>
                <div class="version">v2.0</div>
            </div>`;
        }

        function showLines() {
            app.innerHTML = `<div class="page">
                <div class="top">
                    <div class="brand">G&amp;G SANITATION DIGITAL</div>
                    <h1>SELECT LINE</h1>
                    <p class="sub">Choose your production line</p>
                </div>
                <button class="back-btn" onclick="showLanding()">&#8592; Back</button>
                <div class="card" onclick="selectLine()">
                    <img src="/macy-cupcake.jpg" alt="MACY">
                    <div class="card-info">
                        <div class="card-name">MACY</div>
                        <div class="card-desc">Cupcake</div>
                        <span class="badge badge-active">ACTIVE</span>
                    </div>
                </div>
                <div class="card coming">
                    <img src="/jfk-donut.jpg" alt="JFK">
                    <div class="card-info">
                        <div class="card-name">JFK</div>
                        <div class="card-desc">Mini Donut with Icing</div>
                        <span class="badge badge-soon">SOON</span>
                    </div>
                    <div class="overlay">COMING SOON</div>
                </div>
                <div class="card coming">
                    <img src="/cece-cookie.jpg" alt="Cece">
                    <div class="card-info">
                        <div class="card-name">Cece</div>
                        <div class="card-desc">Cookie with Icing</div>
                        <span class="badge badge-soon">SOON</span>
                    </div>
                    <div class="overlay">COMING SOON</div>
                </div>
            </div>`;
        }

        function selectLine() {
            sessionStorage.setItem("selectedLine", JSON.stringify({id:"macy",name:"MACY"}));
            showControl();
        }

        function showControl() {
            const line = JSON.parse(sessionStorage.getItem("selectedLine") || '{}');
            app.innerHTML = `<div class="page">
                <div class="ctrl-top">
                    <div class="brand">G&amp;G SANITATION DIGITAL</div>
                    <h1>${line.name || "MACY"} CONTROL HUB</h1>
                </div>
                <div class="ring-wrap">
                    <div class="ring">
                        <svg viewBox="0 0 140 140">
                            <defs><linearGradient id="rg"><stop offset="0%" stop-color="#00d084"/><stop offset="100%" stop-color="#00e5a0"/></linearGradient></defs>
                            <circle cx="70" cy="70" r="65" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
                            <circle cx="70" cy="70" r="65" fill="none" stroke="url(#rg)" stroke-width="8" stroke-linecap="round" stroke-dasharray="408" stroke-dashoffset="408"/>
                        </svg>
                        <div class="ring-txt"><div class="pct">0%</div><div class="lbl">COMPLETE</div></div>
                    </div>
                </div>
                <button class="act-btn" onclick="showPreClean()">
                    <div class="act-icon" style="background:linear-gradient(135deg,#a855f7,#9333ea)">&#129530;</div>
                    <div class="act-txt"><div class="t">Pre-Clean</div><div class="d">Foam, rinse, dismantle</div></div>
                    <span class="act-arr">&#8250;</span>
                </button>
                <button class="act-btn" onclick="showPostClean()">
                    <div class="act-icon" style="background:linear-gradient(135deg,#4facfe,#3d8bfe)">&#10024;</div>
                    <div class="act-txt"><div class="t">Post-Clean</div><div class="d">Inspect, bag counts, photo</div></div>
                    <span class="act-arr">&#8250;</span>
                </button>
                <button class="act-btn" onclick="alert('Handover page - coming soon')">
                    <div class="act-icon" style="background:linear-gradient(135deg,#ff8c42,#e8732d)">&#128295;</div>
                    <div class="act-txt"><div class="t">Handover</div><div class="d">Resolve open tasks</div></div>
                    <span class="act-arr">&#8250;</span>
                </button>
                <button class="act-btn" onclick="alert('Verify page - coming soon')">
                    <div class="act-icon" style="background:linear-gradient(135deg,#00d084,#00b894)">&#10003;</div>
                    <div class="act-txt"><div class="t">Area Lead Verify</div><div class="d">Sign-off inspection</div></div>
                    <span class="act-arr">&#8250;</span>
                </button>
                <button class="act-btn" onclick="alert('Release page - coming soon')">
                    <div class="act-icon" style="background:linear-gradient(135deg,#f9ca24,#f0b90b)">&#128275;</div>
                    <div class="act-txt"><div class="t">Release Line</div><div class="d">Final approval to release</div></div>
                    <span class="act-arr">&#8250;</span>
                </button>
                <button class="act-btn" onclick="showLines()">
                    <div class="act-icon" style="background:linear-gradient(135deg,#666,#444)">&#128200;</div>
                    <div class="act-txt"><div class="t">Dashboard</div><div class="d">View stats</div></div>
                    <span class="act-arr">&#8250;</span>
                </button>
            </div>`;
        }

        function showPreClean() {
            app.innerHTML = `<div class="page">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
                    <button class="back-btn" onclick="showControl()">&#8592; Back</button>
                    <h1 style="font-size:20px;flex:1">Pre-Clean Checklist</h1>
                </div>
                <div class="loading"><div class="spinner"></div><p>Loading checklist...</p></div>
            </div>`;
            fetch(`${SUPABASE_URL}/rest/v1/checklist_templates?area_id=eq.${MACY_ID}&phase=eq.pre_cleaning&order=step_number`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            }).then(r => r.json()).then(items => {
                let html = `<div class="page">
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
                        <button class="back-btn" onclick="showControl()">&#8592; Back</button>
                        <h1 style="font-size:20px;flex:1">Pre-Clean Checklist</h1>
                    </div>
                    <div class="emp-in">
                        <label>Employee Name</label>
                        <input id="empName" placeholder="Enter your name">
                    </div>`;
                items.forEach((item, i) => {
                    html += `<div class="glass">
                        <div class="chk-title">${i+1}. ${item.title}</div>
                        <div class="chk-desc">${item.description || ""}</div>
                        <button class="opt">Acceptable</button>
                        <button class="opt">Not Acceptable</button>
                        <button class="opt">N/A</button>
                    </div>`;
                });
                html += `<div class="btn-nav">
                    <button class="btn-cancel" onclick="showControl()">Cancel</button>
                    <button class="btn-submit">Submit</button>
                </div></div>`;
                app.innerHTML = html;
            }).catch(e => {
                app.innerHTML = `<div class="page">
                    <h1>Pre-Clean Checklist</h1>
                    <div class="bn bn-dang">Failed to load checklist. Please check your connection.</div>
                    <button class="back-btn" onclick="showControl()">&#8592; Back to Control</button>
                </div>`;
            });
        }

        function showPostClean() {
            app.innerHTML = `<div class="page">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
                    <button class="back-btn" onclick="showControl()">&#8592; Back</button>
                    <h1 style="font-size:20px;flex:1">Post-Clean Checklist</h1>
                </div>
                <div class="loading"><div class="spinner"></div><p>Loading checklist...</p></div>
            </div>`;
            fetch(`${SUPABASE_URL}/rest/v1/checklist_templates?area_id=eq.${MACY_ID}&phase=eq.post_cleaning&order=step_number`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            }).then(r => r.json()).then(items => {
                let html = `<div class="page">
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
                        <button class="back-btn" onclick="showControl()">&#8592; Back</button>
                        <h1 style="font-size:20px;flex:1">Post-Clean Checklist</h1>
                    </div>
                    <div class="counts">
                        <div><label>Good Bags</label><input type="number" placeholder="0"></div>
                        <div><label>Bad Bags</label><input type="number" placeholder="0"></div>
                    </div>`;
                items.forEach((item, i) => {
                    html += `<div class="glass">
                        <div class="chk-title">${i+1}. ${item.title}</div>
                        <div class="chk-desc">${item.description || ""}</div>
                        <button class="opt">Acceptable</button>
                        <button class="opt">Not Acceptable</button>
                        <button class="opt">N/A</button>
                    </div>`;
                });
                html += `<div class="btn-nav">
                    <button class="btn-cancel" onclick="showControl()">Cancel</button>
                    <button class="btn-submit">Submit</button>
                </div></div>`;
                app.innerHTML = html;
            }).catch(e => {
                app.innerHTML = `<div class="page">
                    <h1>Post-Clean Checklist</h1>
                    <div class="bn bn-dang">Failed to load checklist. Please check your connection.</div>
                    <button class="back-btn" onclick="showControl()">&#8592; Back to Control</button>
                </div>`;
            });
        }

        // Route based on URL params
        const page = new URLSearchParams(window.location.search).get("page");
        if (page === "lines") showLines();
        else if (page === "control") showControl();
        else if (page === "pre-clean") showPreClean();
        else if (page === "post-clean") showPostClean();
        else showLanding();
    </script>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
